# jarvis.conf — Jarvis Voice TUI configuration
#
# Lines starting with # are comments.
# Format: KEY = value
# Env vars override these settings (e.g. JARVIS_GATEWAY_URL=... python3 tui.py)

# ── OpenClaw / Gateway ─────────────────────────────────────────────
# URL of the OpenClaw gateway server
GATEWAY_URL = http://localhost:18789

# Bearer token for gateway auth (leave blank if not required)
AUTH_TOKEN =

# Session key sent with each gateway message
SESSION_KEY = agent:main:subagent:jarvis-tui

# OpenClaw CLI session ID (used when `openclaw` binary is available)
OPENCLAW_SESSION_ID = jarvis-tui

# Seconds to wait for OpenClaw to respond before giving up
OPENCLAW_TIMEOUT = 90

# ── Wake word ──────────────────────────────────────────────────────
# Word/phrase that triggers the assistant (VAD fires first, then this
# is checked via STT if REQUIRE_WAKE_WORD is enabled)
WAKE_WORD = hello

# Set to 1 to require the wake word to be spoken before answering
# Set to 0 to respond to any voice detected by VAD
REQUIRE_WAKE_WORD = 0

# Seconds of STT window to detect the wake word (only used when REQUIRE_WAKE_WORD=1)
WAKE_WORD_TIMEOUT = 5.0

# ── Recording ──────────────────────────────────────────────────────
# Path to the whisper model file (auto-detected if left blank)
WHISPER_MODEL =

# Seconds to record for each question (the countdown bar shows this)
RECORD_DURATION = 8.0

# Seconds to wait after waking before opening the mic
# (gives "Yes?" TTS time to finish so it isn't captured)
MIC_DELAY = 1.0

# Max seconds to wait for a follow-up reply before ending the conversation
CONVERSATION_IDLE_TIMEOUT = 15.0

# Max seconds to wait for the initial question after waking
QUESTION_TIMEOUT = 45.0

# ── TTS ────────────────────────────────────────────────────────────
# Estimated words per minute for TTS (used to compute wait times)
TTS_WORDS_PER_MINUTE = 155

# Max seconds to wait for TTS to finish
TTS_MAX_WAIT_SECONDS = 18

# ── VAD ────────────────────────────────────────────────────────────
# RMS energy threshold — frames above this are considered speech
ENERGY_THRESHOLD = 800
